site_name: HVE Manual
site_url: https://manuals.edccorp.com/
site_description: HVE (Human Vehicle Environment) manual — dialog reference, user's manual, and physics program manuals, updated from source code.
docs_dir: docs/manuals
site_dir: site
use_directory_urls: true

theme:
  name: material
  logo: assets/hve-cube.png
  favicon: assets/hve-cube.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - assets/brand.css

extra_javascript:
  - assets/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js

plugins:
  - search

